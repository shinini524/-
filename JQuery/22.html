<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-1{
            width: 100px;
            height: 100px;
            background-color: cadetblue;
            position: relative;
        }
        .box-2{
            width: 100px;
            height: 100px;
            background-color: blanchedalmond;
            position: relative;
        }
    </style>
</head>

<body>
    <p class="text1">작동을 하게 하는 방법</p>
    <button class="hide-btn">Hide</button>
    <button class="show-btn">Show</button>
    <button class="toggle-btn">Toggle</button>
    <hr>
    <p class="text2">완전 애니메이션</p>
    <button class="fade-in">FadeIn</button>
    <button class="fade-out">FadeOut</button>
    <button class="fade-toggle">fadeetoggle</button>
    <!-- 제이쿼리 -->
    <hr>
    <p class="slide-down">슬라이드</p>
    <button class="slide-down">down</button>
    <button class="slide-up">up</button>
    <button class="slide-toggle">toggle</button>
    <hr>
    <button class="ani-btn">움직여</button>
    <div class="box-1"></div>
    <hr>
    <button class="mot-btn">모션</button>
    <div class="box-2"></div>

    <script src="js/libs/jquery.min.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
