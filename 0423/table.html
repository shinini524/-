<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .table,tr,td{
            border: 1px solid #000;
            /* border-spacing: 0; */
            border-collapse: collapse ;
            /* border-collapse: collapse; 간격을 조절하는 */
        }
        .ta tr>td:nth-child(1){
            font-weight: bold;
            background-color: aqua;
        }
    </style>
</head>
<body>
   <table class="ta">
    <tr>
        <td>지속가능경영</td>
        <td>에너지</td>
    </tr>
    <tr>
        <td>한화에어로스페이스</td>
        <td><span>23,150</span>(절감)만원</td>
        <!-- <span> 테이블 안에 숫자 값이 들어가면 , 데이터 , 변하는거 -->
    </tr>
   </table> 
</body>
</html>
